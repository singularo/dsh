; Xdebug 3.x Configuration - Updated from 2.x legacy settings
zend_extension=xdebug.so

; Connection settings (replaces remote_* settings)
xdebug.client_host=172.17.0.1
xdebug.client_port=9003
xdebug.idekey=PHPSTORM

; Control when Xdebug starts (replaces remote_enable/autostart)
xdebug.start_with_request=trigger
xdebug.discover_client_host=false

; Performance settings
xdebug.max_nesting_level=1500
xdebug.max_stack_frames=-1

; Profiling settings (replaces profiler_* settings)
xdebug.output_dir=/shared/xdebug
xdebug.use_compression=true

; Debugging settings
xdebug.log_level=0
xdebug.show_exception_trace=false
xdebug.show_local_vars=false

; Variable display limits (keeping reasonable defaults)
xdebug.var_display_max_children=128
xdebug.var_display_max_data=512
xdebug.var_display_max_depth=3
